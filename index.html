<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Dieta"/>
<meta name="theme-color" content="#000000"/>
<link rel="manifest" href="./manifest.json"/>
<title>Plano Alimentar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══ RESET & ROOT ══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000000;
  --bg2:rgba(18,18,20,0.95);
  --glass:rgba(255,255,255,0.045);
  --glass-border:rgba(255,255,255,0.10);
  --glass-border-strong:rgba(255,255,255,0.18);
  --glass-shine:rgba(255,255,255,0.06);
  --surface:rgba(28,28,32,0.80);
  --surface2:rgba(38,38,44,0.70);
  --green:#30D158;
  --green-dim:rgba(48,209,88,0.15);
  --green-glow:rgba(48,209,88,0.25);
  --blue:#0A84FF;
  --blue-dim:rgba(10,132,255,0.15);
  --gold:#FFD60A;
  --gold-dim:rgba(255,214,10,0.15);
  --coral:#FF6B6B;
  --coral-dim:rgba(255,107,107,0.15);
  --purple:#BF5AF2;
  --purple-dim:rgba(191,90,242,0.15);
  --text:#FFFFFF;
  --text2:rgba(255,255,255,0.65);
  --text3:rgba(255,255,255,0.35);
  --text4:rgba(255,255,255,0.15);
  --mono:'DM Mono',monospace;
  --sf:-apple-system,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
  --radius:18px;
  --radius-sm:12px;
  --radius-xs:8px;
}
html,body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:var(--sf);-webkit-font-smoothing:antialiased;
  overscroll-behavior:none;overflow:hidden;
}
/* ═══ NOISE TEXTURE OVERLAY ════════════════════════════════ */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}
/* ═══ APP SHELL ═════════════════════════════════════════════ */
#app{
  max-width:430px;margin:0 auto;height:100vh;
  display:flex;flex-direction:column;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 20% 0%, rgba(10,132,255,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 30%, rgba(48,209,88,0.05) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 100%, rgba(191,90,242,0.06) 0%, transparent 60%),
              var(--bg);
}
/* ═══ LIQUID GLASS MIXIN ════════════════════════════════════ */
.glass{
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--glass-border);
  position:relative;overflow:hidden;
}
.glass::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--glass-shine) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
/* ═══ HEADER ════════════════════════════════════════════════ */
.hdr{
  padding:calc(var(--safe-top) + 14px) 20px 0;
  position:relative;z-index:100;flex-shrink:0;
  background:linear-gradient(180deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.0) 100%);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
}
.hdr-inner{max-width:430px;margin:0 auto}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.hdr-greeting{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;margin-bottom:3px;height:16px;overflow:hidden}
.hdr-title{font-size:22px;font-weight:600;letter-spacing:-0.5px;color:var(--text);line-height:1.1}
.hdr-title span{background:linear-gradient(90deg,#fff 0%,rgba(255,255,255,0.6) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ═══ RING ══════════════════════════════════════════════════ */
.ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg);filter:drop-shadow(0 0 8px currentColor)}
.ring-bg{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:3.5}
.ring-fill{fill:none;stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.34,1.56,.64,1),stroke .4s}
.ring-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500}

/* ═══ TABS ══════════════════════════════════════════════════ */
.tabs{
  display:flex;gap:2px;padding:0 4px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{
  flex:1;min-width:60px;padding:10px 4px 12px;border:none;background:transparent;
  cursor:pointer;font-family:var(--mono);font-size:9px;letter-spacing:.5px;
  color:var(--text3);position:relative;transition:color .2s;white-space:nowrap;
}
.tab-btn::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:0;height:2px;border-radius:2px;background:var(--text);
  transition:width .25s cubic-bezier(.34,1.56,.64,1);
}
.tab-btn.active{color:var(--text)}
.tab-btn.active::after{width:24px}

/* ═══ SCROLL AREA ═══════════════════════════════════════════ */
.scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--safe-bottom) + 40px);
  position:relative;
}
.scroll::-webkit-scrollbar{display:none}

/* ═══ DAY PICKER ════════════════════════════════════════════ */
.day-picker{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:14px 16px 0}
.day-btn{
  padding:8px 2px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);
  background:transparent;cursor:pointer;text-align:center;transition:all .25s;
}
.day-btn.sel{
  border-color:rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(10px);
}
.day-name{font-family:var(--mono);font-size:7px;letter-spacing:.5px;color:var(--text4);text-transform:uppercase;margin-bottom:4px}
.day-btn.sel .day-name{color:var(--text2)}
.day-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);margin:0 auto 3px;box-shadow:0 0 6px var(--gold)}
.day-prog{font-family:var(--mono);font-size:8px;color:var(--text4)}
.day-prog.done{color:var(--green)}.day-prog.part{color:var(--gold)}

/* ═══ SECTION WRAP ══════════════════════════════════════════ */
.wrap{padding:14px 16px}
.section-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:10px}

/* ═══ GLASS CARDS ═══════════════════════════════════════════ */
.card{
  margin-bottom:10px;border-radius:var(--radius);overflow:hidden;
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--glass-border);
  position:relative;transition:border-color .4s,box-shadow .4s;
}
.card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 50%);
  z-index:0;border-radius:inherit;
}
.card.done{
  border-color:rgba(48,209,88,0.25);
  box-shadow:0 0 20px rgba(48,209,88,0.08),inset 0 0 30px rgba(48,209,88,0.03);
}
.card-hdr{
  padding:12px 16px 10px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:1;
}
.card.done .card-hdr{border-bottom-color:rgba(48,209,88,0.12)}
.card-title{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--text2);letter-spacing:-.2px}
.card.done .card-title{color:var(--green)}
.card-count{font-family:var(--mono);font-size:10px;color:var(--text3)}
.card.done .card-count{color:rgba(48,209,88,0.6)}

/* ═══ SWIPE ROWS ════════════════════════════════════════════ */
.rows-container{position:relative;overflow:hidden}
.row-wrap{position:relative;overflow:hidden}
.row-bg-left{
  position:absolute;inset:0;left:0;
  background:linear-gradient(90deg,rgba(48,209,88,0.2) 0%,transparent 100%);
  display:flex;align-items:center;padding-left:20px;
  font-size:16px;opacity:0;transition:opacity .15s;z-index:0;
  border-radius:var(--radius-xs);
}
.row{
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  cursor:pointer;transition:background .15s,transform .25s cubic-bezier(.34,1.2,.64,1);
  user-select:none;position:relative;z-index:1;
  touch-action:pan-y;
}
.row:active{background:rgba(255,255,255,0.02)}
.row.chk{background:rgba(48,209,88,0.03)}

/* ═══ CHECKBOX ══════════════════════════════════════════════ */
.chkbox{
  width:22px;height:22px;border-radius:7px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:transparent;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.chkbox.chk{
  border-color:var(--green);background:var(--green);
  box-shadow:0 0 12px rgba(48,209,88,0.4);
  animation:checkPop .35s cubic-bezier(.34,1.56,.64,1);
}
.chkbox.blue{border-color:rgba(10,132,255,0.4)}
.chkbox svg{opacity:0;transform:scale(0);transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.chkbox.chk svg{opacity:1;transform:scale(1)}
@keyframes checkPop{0%{transform:scale(0.8)}50%{transform:scale(1.15)}100%{transform:scale(1)}}

.fname{flex:1;font-size:13px;color:var(--text2);transition:all .3s;letter-spacing:-.1px}
.row.chk .fname{color:rgba(255,255,255,0.2);text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.15)}
.fname.cr{color:var(--blue);font-style:italic}
.row.chk .fname.cr{color:rgba(10,132,255,0.3)}
.fqty{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0}
.row.chk .fqty{color:var(--text4)}

/* ═══ STAT GRID ═════════════════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0}
.stat-card{
  border-radius:var(--radius-sm);padding:14px;
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid var(--glass-border);
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 60%);
}
.stat-card.full{grid-column:1/-1}
.stat-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text);line-height:1;letter-spacing:-1px}
.stat-val.green{color:var(--green);text-shadow:0 0 20px rgba(48,209,88,0.4)}
.stat-val.blue{color:var(--blue)}
.stat-val.gold{color:var(--gold);text-shadow:0 0 20px rgba(255,214,10,0.3)}
.stat-val.small{font-size:16px;letter-spacing:-.5px}
.stat-sub{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:4px;line-height:1.4}
.stat-icon{position:absolute;top:12px;right:12px;font-size:20px;opacity:.15}

/* ═══ PROGRESS BARS ═════════════════════════════════════════ */
.prog-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.34,1.2,.64,1)}

/* ═══ STREAK BAR ════════════════════════════════════════════ */
.streak-bar{display:flex;gap:5px;padding:14px 16px 0}
.streak-day{
  flex:1;height:36px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:7px;color:var(--text4);
  flex-direction:column;gap:2px;transition:all .3s;
}
.streak-day.done{background:var(--green-dim);border-color:rgba(48,209,88,0.25)}
.streak-day.today{border-color:rgba(255,214,10,0.4)}
.streak-day .sd-name{font-size:6px;text-transform:uppercase;letter-spacing:.5px}
.streak-day .sd-icon{font-size:11px}

/* ═══ WEIGHT CHART ══════════════════════════════════════════ */
.chart-wrap{
  padding:16px;border-radius:var(--radius-sm);
  background:var(--glass);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);overflow:hidden;position:relative;
}
.chart-wrap::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 50%);
  pointer-events:none;
}
.chart-wrap svg{width:100%;display:block}
.no-data{
  font-family:var(--mono);font-size:10px;color:var(--text3);
  text-align:center;padding:32px 0;display:flex;flex-direction:column;align-items:center;gap:10px;
}
.no-data-icon{font-size:32px;opacity:.3}
.no-data-text{line-height:1.6}

/* ═══ DONE BANNER ═══════════════════════════════════════════ */
.done-banner{
  text-align:center;padding:24px 20px;border-radius:var(--radius);
  background:var(--green-dim);
  border:1px solid rgba(48,209,88,0.2);
  margin-top:4px;position:relative;overflow:hidden;
}
.done-banner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(48,209,88,0.15) 0%,transparent 70%);
  pointer-events:none;
}
.done-banner .di{font-size:32px;margin-bottom:8px}
.done-banner .dt{font-size:16px;font-weight:600;color:var(--green);margin-bottom:4px;letter-spacing:-.3px}
.done-banner .ds{font-family:var(--mono);font-size:9px;color:rgba(48,209,88,0.5);letter-spacing:1.5px}

/* ═══ INSTALL BANNER ════════════════════════════════════════ */
.install{
  margin:14px 16px 0;padding:12px 16px;border-radius:var(--radius-sm);
  background:var(--blue-dim);border:1px solid rgba(10,132,255,0.2);
  display:flex;align-items:center;gap:10px;font-size:12px;color:var(--blue);
}
.inst-close{margin-left:auto;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0;line-height:1}

/* ═══ SHOPPING ═══════════════════════════════════════════════ */
.shop-sum{
  margin:14px 16px 10px;padding:14px 16px;border-radius:var(--radius-sm);
  background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;
}
.sum-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.sum-count{font-family:var(--mono);font-size:13px;color:var(--text)}
.clr-btn{
  font-family:var(--mono);font-size:10px;color:var(--text3);
  background:transparent;border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;padding:6px 12px;cursor:pointer;transition:all .2s;
}
.clr-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text2)}
.shop-info{flex:1}
.shop-irow{display:flex;align-items:center;justify-content:space-between}
.sname{font-size:13px;color:var(--text2);transition:all .3s}
.row.chk .sname{color:var(--text4);text-decoration:line-through}
.sqty{font-family:var(--mono);font-size:10px;color:var(--text3)}
.row.chk .sqty{color:var(--text4)}
.stip{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:2px}
.row.chk .stip{color:var(--text4)}

/* ═══ MACRO DONUT ═══════════════════════════════════════════ */
.macro-row{display:flex;align-items:center;gap:16px;padding:16px}
.macro-donut{position:relative;flex-shrink:0}
.macro-donut svg{transform:rotate(-90deg)}
.macro-legend{flex:1;display:flex;flex-direction:column;gap:8px}
.macro-item{display:flex;align-items:center;gap:8px}
.macro-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.macro-name{font-family:var(--mono);font-size:10px;color:var(--text3);flex:1}
.macro-val{font-family:var(--mono);font-size:11px;color:var(--text2)}
.macro-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.macro-center-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);line-height:1}
.macro-center-label{font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:1px}

/* ═══ INSIGHT CARD ═══════════════════════════════════════════ */
.insight-card{
  margin:0 16px 10px;padding:14px 16px;border-radius:var(--radius-sm);
  background:var(--purple-dim);border:1px solid rgba(191,90,242,0.2);
  position:relative;overflow:hidden;
}
.insight-card::before{
  content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;
  border-radius:50%;background:rgba(191,90,242,0.1);
}
.insight-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:rgba(191,90,242,0.6);text-transform:uppercase;margin-bottom:6px}
.insight-text{font-size:13px;color:var(--text2);line-height:1.5}

/* ═══ EVAL FORM ═════════════════════════════════════════════ */
.eval-section{padding:14px 16px 0}
.eval-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.eval-opt{
  padding:7px 13px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);
  background:transparent;font-size:12px;cursor:pointer;transition:all .2s;color:var(--text2);
}
.eval-opt.sel{border-color:rgba(255,214,10,0.4);background:var(--gold-dim);color:var(--gold)}
.eval-save{
  width:100%;padding:12px;background:rgba(255,255,255,0.06);
  backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius-xs);color:var(--text);font-family:var(--mono);
  font-size:10px;letter-spacing:1.5px;cursor:pointer;margin-top:8px;
  transition:all .2s;
}
.eval-save:hover{background:rgba(255,255,255,0.1)}

/* ═══ RECIPES ════════════════════════════════════════════════ */
.recipe-filter{display:flex;gap:6px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.recipe-filter::-webkit-scrollbar{display:none}
.filt-btn{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);background:transparent;
  font-family:var(--mono);font-size:9px;letter-spacing:.8px;color:var(--text3);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.filt-btn.active{border-color:rgba(255,255,255,0.25);color:var(--text);background:rgba(255,255,255,0.06)}
.recipes-wrap{padding:12px 16px}
.recipe-card{
  margin-bottom:10px;border-radius:var(--radius);
  background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);overflow:hidden;position:relative;
}
.recipe-card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 50%);
}
.recipe-card-hdr{padding:14px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:relative;z-index:1}
.recipe-name{font-size:14px;font-weight:600;color:var(--text);flex:1;letter-spacing:-.2px}
.recipe-badges{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge-freeze{font-size:14px;line-height:1}

function getDayProg(dayName){
  const dm=MEALS[dayName];let total=0,done=0;
  MEAL_ORDER.forEach(m=>dm[m].forEach((_,i)=>{total++;if(state.checked[`${dayName}__${m}__${i}`])done++}));
  return total===0?0:Math.round(done/total*100);
}
function getMealProg(dayName,meal){
  const items=MEALS[dayName][meal];
  const done=items.filter((_,i)=>state.checked[`${dayName}__${meal}__${i}`]).length;
  return {done,total:items.length,pct:Math.round(done/items.length*100)};
}
function fmtBRL(v){return 'R$ '+Number(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
function fmtDate(str){if(!str)return '';const[y,m,d]=str.split('-');return `${d}/${m}`}

function getGreeting(){
  const h=new Date().getHours();
  const day=DAYS[getTodayIdx()];
  if(h>=5&&h<12) return{text:`Bom dia ☀️`,sub:`${day}-feira · vamos com tudo!`};
  if(h>=12&&h<15) return{text:`Hora do almoço 🍽️`,sub:`Não esquece de marcar`};
  if(h>=15&&h<18) return{text:`Boa tarde 🌤️`,sub:`Hora do lanche`};
  if(h>=18&&h<22) return{text:`Boa noite 🌙`,sub:`Hora do jantar`};
  return{text:`Ainda acordado? 🦉`,sub:`Amanhã é novo começo`};
}

function calcStreak(){
  let streak=0;
  const now=new Date();
  for(let i=0;i<60;i++){
    const d=new Date(now);d.setDate(now.getDate()-i);
    const di=d.getDay()===0?6:d.getDay()-1;
    const prog=getDayProg(DAYS[di]);
    if(prog===100) streak++;
    else if(i>0) break;
  }
  return streak;
}

function getInsight(){
  const progs=DAYS.map(d=>getDayProg(d));
  const avg=Math.round(progs.reduce((a,b)=>a+b,0)/7);
  const streak=calcStreak();
  const skipMeals={};
  MEAL_ORDER.forEach(meal=>{
    let skipped=0;
    DAYS.forEach(day=>{
      const {pct}=getMealProg(day,meal);
      if(pct<50) skipped++;
    });
    skipMeals[meal]=skipped;
  });
  const mostSkipped=Object.entries(skipMeals).sort((a,b)=>b[1]-a[1])[0];

  if(streak>=7) return `🔥 ${streak} dias de sequência! Você está numa fase incrível — continue assim.`;
  if(avg>=80) return `💪 Média de ${avg}% esta semana. Consistência de elite!`;
  if(mostSkipped[1]>=4) return `💡 Você tende a pular o "${mostSkipped[0]}". Que tal preparar com antecedência?`;
  const todayP=getDayProg(DAYS[getTodayIdx()]);
  if(todayP===100) return `✅ Dieta 100% hoje! Cada dia completo te leva mais perto do objetivo.`;
  if(todayP===0) return `🎯 Hoje ainda está em branco. Cada refeição marcada conta — começa agora!`;
  return `📊 ${todayP}% concluído hoje. Você está no caminho certo!`;
}

function ring(pct,color,label){
  const r=24,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
  const lbl=label!==undefined?label:`${pct}%`;
  return `<div class="ring-wrap">
    <svg width="56" height="56" viewBox="0 0 56 56" style="color:${color}">
      <circle class="ring-bg" cx="28" cy="28" r="${r}"/>
      <circle class="ring-fill" cx="28" cy="28" r="${r}" stroke="${color}"
        stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
    </svg>
    <div class="ring-lbl" style="color:${color}">${lbl}</div>
  </div>`;
}

// Weight chart SVG
function weightChart(weights){
  if(weights.length<2) return `<div class="no-data">
    <div class="no-data-icon">⚖️</div>
    <div class="no-data-text">Registre ao menos 2 pesagens<br>para ver sua evolução</div>
  </div>`;
  const sorted=[...weights].sort((a,b)=>a.date.localeCompare(b.date)).slice(-14);
  const vals=sorted.map(w=>w.val);
  const min=Math.min(...vals)-1.5,max=Math.max(...vals)+1.5;
  const W=320,H=110,pd=24;
  const x=i=>pd+(i/(sorted.length-1))*(W-pd*2);
  const y=v=>H-pd-((v-min)/(max-min))*(H-pd*2);
  const pts=sorted.map((w,i)=>`${x(i)},${y(w.val)}`).join(' ');
  const area=`${x(0)},${H-2} `+sorted.map((w,i)=>`${x(i)},${y(w.val)}`).join(' ')+` ${x(sorted.length-1)},${H-2}`;
  const minW=sorted[vals.indexOf(Math.min(...vals))];
  const maxW=sorted[vals.indexOf(Math.max(...vals))];
  const minIdx=sorted.indexOf(minW);
  const maxIdx=sorted.indexOf(maxW);
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
    <defs>
      <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#30D158" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#30D158" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${area}" fill="url(#wg)"/>
    <polyline points="${pts}" fill="none" stroke="#30D158" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${sorted.map((w,i)=>`<circle cx="${x(i)}" cy="${y(w.val)}" r="${i===minIdx||i===maxIdx?4:2.5}" fill="${i===minIdx?'#FF6B6B':i===maxIdx?'#30D158':'rgba(48,209,88,0.6)'}" stroke="${i===minIdx||i===maxIdx?'#000':'none'}" stroke-width="1"/>`).join('')}
    <text x="${x(0)}" y="${H-4}" fill="rgba(255,255,255,0.3)" font-size="8" text-anchor="middle" font-family="'DM Mono',monospace">${fmtDate(sorted[0].date)}</text>
    <text x="${x(sorted.length-1)}" y="${H-4}" fill="rgba(255,255,255,0.3)" font-size="8" text-anchor="middle" font-family="'DM Mono',monospace">${fmtDate(sorted[sorted.length-1].date)}</text>
    <text x="${x(minIdx)}" y="${y(minW.val)+16}" fill="#FF6B6B" font-size="8" text-anchor="middle" font-family="'DM Mono',monospace">${minW.val}kg</text>
    <text x="${x(maxIdx)}" y="${y(maxW.val)-6}" fill="rgba(48,209,88,0.8)" font-size="8" text-anchor="middle" font-family="'DM Mono',monospace">${maxW.val}kg</text>
  </svg>`;
}

// Macro donut
function macroDonut(checkedMeals){
  let p=0,c=0,f=0,kcal=0;
  MEAL_ORDER.forEach(meal=>{
    const dayProg=getMealProg(DAYS[getTodayIdx()],meal);
    const ratio=dayProg.done/dayProg.total;
    const m=MEAL_MACROS[meal];
    p+=m.p*ratio;c+=m.c*ratio;f+=m.f*ratio;kcal+=m.kcal*ratio;
  });
  p=Math.round(p);c=Math.round(c);f=Math.round(f);kcal=Math.round(kcal);
  const total=p+c+f||1;
  const pPct=Math.round(p/total*100),cPct=Math.round(c/total*100),fPct=100-pPct-cPct;
  const r=46,circ=2*Math.PI*r;
  const pOff=circ-(pPct/100)*circ;
  const cStart=(pPct/100)*circ;
  const cOff=circ-(cPct/100)*circ;
  const fStart=((pPct+cPct)/100)*circ;
  const fOff=circ-(fPct/100)*circ;
  return `<div class="macro-row">
    <div class="macro-donut" style="width:110px;height:110px">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="10"/>
        <circle cx="55" cy="55" r="${r}" fill="none" stroke="#30D158" stroke-width="10"
          stroke-dasharray="${circ}" stroke-dashoffset="${pOff}" stroke-linecap="round"
          transform="rotate(-90 55 55)" style="transition:stroke-dashoffset .8s ease"/>
        <circle cx="55" cy="55" r="${r}" fill="none" stroke="#0A84FF" stroke-width="10"
          stroke-dasharray="${circ}" stroke-dashoffset="${cOff}"
          transform="rotate(${-90+pPct*3.6} 55 55)" style="transition:stroke-dashoffset .8s ease"/>
        <circle cx="55" cy="55" r="${r}" fill="none" stroke="#FFD60A" stroke-width="10"
          stroke-dasharray="${circ}" stroke-dashoffset="${fOff}"
          transform="rotate(${-90+(pPct+cPct)*3.6} 55 55)" style="transition:stroke-dashoffset .8s ease"/>
      </svg>
      <div class="macro-center">
        <div class="macro-center-val">${kcal}</div>
        <div class="macro-center-label">kcal</div>
      </div>
    </div>
    <div class="macro-legend">
      <div class="macro-item"><div class="macro-dot" style="background:#30D158"></div><div class="macro-name">Proteína</div><div class="macro-val">${p}g</div></div>
      <div class="macro-item"><div class="macro-dot" style="background:#0A84FF"></div><div class="macro-name">Carboidrato</div><div class="macro-val">${c}g</div></div>
      <div class="macro-item"><div class="macro-dot" style="background:#FFD60A"></div><div class="macro-name">Gordura</div><div class="macro-val">${f}g</div></div>
    </div>
  </div>`;
}

      background:${color};
      border-radius:${shape};
      width:${6+Math.random()*6}px;
      height:${6+Math.random()*6}px;
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*.5}s;
    `;
    c.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
  if(navigator.vibrate) navigator.vibrate([30,50,80]);
}

function checkMilestone(streak){
  const milestones=[
    {n:7,icon:'🔥',title:'Uma semana!',sub:'7 dias consecutivos. A disciplina virou hábito.'},
    {n:14,icon:'💪',title:'Duas semanas!',sub:'14 dias de sequência. Você é consistente de verdade.'},
    {n:30,icon:'🏆',title:'Um mês!',sub:'30 dias. Isso aqui não é força de vontade — é identidade.'},
  ];
  for(const m of milestones){
    if(streak===m.n && !state.milestoneShown.includes(m.n)){
      showMilestone(m);
      setState({milestoneShown:[...state.milestoneShown,m.n]});
      break;
    }
  }
}

function showMilestone(m){
  launchConfetti();
  const overlay=document.createElement('div');
  overlay.className='milestone-overlay';
  overlay.innerHTML=`<div class="milestone-card">
    <span class="milestone-icon">${m.icon}</span>
    <div class="milestone-title">${m.title}</div>
    <div class="milestone-sub">${m.sub}</div>
    <button class="milestone-close" onclick="this.closest('.milestone-overlay').remove()">CONTINUAR</button>
  </div>`;
  document.body.appendChild(overlay);
}

// RENDER FINANCEIRO
// ═══════════════════════════════════════════════════════
function renderFinanceiro(){
  const ps=state.purchases;
  const now=new Date();
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay()+(now.getDay()===0?-6:1));weekStart.setHours(0,0,0,0);
  const thisWeekPs=ps.filter(p=>new Date(p.date+'T00:00:00')>=weekStart);
  const weekTotal=thisWeekPs.reduce((a,p)=>a+p.val,0);
  const allTotal=ps.reduce((a,p)=>a+p.val,0);
  const metaPct=Math.min(Math.round(weekTotal/state.finMeta*100),100);
  const metaColor=metaPct>90?'#FF6B6B':metaPct>70?'#FFD60A':'#30D158';

  const catTotals={};
  thisWeekPs.forEach(p=>{catTotals[p.cat]=(catTotals[p.cat]||0)+p.val});
  const maxCat=Math.max(...Object.values(catTotals),1);

  const weeklyMap={};
  ps.forEach(p=>{
    const d=new Date(p.date+'T00:00:00');
    const ws=new Date(d);ws.setDate(d.getDate()-d.getDay()+(d.getDay()===0?-6:1));
    const wk=`${ws.getFullYear()}-${pad(ws.getMonth()+1)}-${pad(ws.getDate())}`;
    weeklyMap[wk]=(weeklyMap[wk]||0)+p.val;
  });
  const sortedWeeks=Object.entries(weeklyMap).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);

  const selDate=new Date(state.finDate+'T00:00:00');
  const y=selDate.getFullYear(),m=selDate.getMonth();
  const firstDay=new Date(y,m,1).getDay();
  const offset=firstDay===0?6:firstDay-1;
  const dim=new Date(y,m+1,0).getDate();
  const mNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const purchaseDates=new Set(ps.map(p=>p.date));
  const tod=todayStr();
  let cells='';
  for(let i=0;i<offset;i++) cells+=`<div class="cal-day empty"></div>`;
  for(let d2=1;d2<=dim;d2++){
    const ds=`${y}-${pad(m+1)}-${pad(d2)}`;
    cells+=`<div class="cal-day${ds===tod?' today':''}${purchaseDates.has(ds)?' has-p':''}${ds===state.finDate?' sel':''}" onclick="setFinDate('${ds}')">
      <div class="cal-num">${d2}</div>
      ${purchaseDates.has(ds)?'<div class="cal-dot"></div>':''}
    </div>`;
  }

  const selPs=ps.filter(p=>p.date===state.finDate);
  const selTotal=selPs.reduce((a,p)=>a+p.val,0);
  const purchaseList=selPs.length===0
    ?`<div style="padding:16px;text-align:center"><div style="font-size:28px;opacity:.2;margin-bottom:6px">🧾</div><div style="font-family:var(--mono);font-size:10px;color:var(--text3)">Nenhum lançamento<br>neste dia</div></div>`
    :selPs.map(p=>`<div class="purchase-item">
      <div class="pi-left"><div class="pi-name">${p.name}</div><div class="pi-cat">${p.cat}</div></div>
      <div class="pi-val">${fmtBRL(p.val)}</div>
      <button class="pi-del" onclick="deletePurchase('${p.id}')">×</button>
    </div>`).join('');

  const catBars=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>
    `<div class="cat-bar-row">
      <div class="cat-bar-name">${cat.replace(/^[^\s]+\s/,'')}</div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${Math.round(val/maxCat*100)}%;background:var(--gold)"></div></div>
      <div class="cat-bar-val">${fmtBRL(val)}</div>
    </div>`).join('');

  const histRows=sortedWeeks.map(([wk,val])=>{
    const d3=new Date(wk+'T00:00:00');
    return `<div class="hist-row">
      <div class="hist-week">Semana ${pad(d3.getDate())}/${pad(d3.getMonth()+1)}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="hist-val">${fmtBRL(val)}</div>
        <div style="font-family:var(--mono);font-size:9px;color:${val>state.finMeta?'#FF6B6B':'#30D158'}">${val>state.finMeta?'acima':'ok'}</div>
      </div>
    </div>`;
  }).join('');

  const f=state.finForm;
  const metaInput=state.finMetaEdit
    ?`<div style="display:flex;gap:8px;align-items:center;margin-top:6px">
        <input type="number" value="${state.finMeta}" id="meta-input"
          style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;width:100px"/>
        <button onclick="saveMeta()" style="padding:7px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:10px;cursor:pointer">OK</button>
        <button onclick="setState({finMetaEdit:false})" style="padding:7px 10px;background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer">×</button>
      </div>`
    :`<div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:4px;cursor:pointer" onclick="setState({finMetaEdit:true})">Meta: ${fmtBRL(state.finMeta)} · <span style="color:var(--gold)">editar</span></div>`;

  const greet=getGreeting();
  return hdr('Financeiro',greet.sub,ring(metaPct,metaColor),'financeiro')+
  `<div class="scroll">
    <div class="fin-stats fade-up">
      <div class="stat-card" style="border-color:${metaColor}22">
        <div class="stat-label">Esta semana</div>
        <div class="stat-val small" style="color:${metaColor}">${fmtBRL(weekTotal)}</div>
        ${metaInput}
      </div>
      <div class="stat-card">
        <div class="stat-label">Total geral</div>
        <div class="stat-val small">${fmtBRL(allTotal)}</div>
        <div class="stat-sub">${ps.length} lançamentos</div>
      </div>
    </div>

    ${Object.keys(catTotals).length>0?`<div class="cat-bars" style="margin-top:14px"><div class="sum-label" style="margin-bottom:10px">Por categoria · semana</div>${catBars}</div>`:''}

    <div class="cal-wrap" style="margin-top:14px">
      <div class="cal-title-row">
        <div class="cal-month">${mNames[m]} ${y}</div>
        <div class="cal-nav"><button onclick="prevMonth()">‹</button><button onclick="nextMonth()">›</button></div>
      </div>
      <div class="cal-grid">
        ${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>

    <div class="add-form" style="margin-top:14px">
      <div class="add-form-hdr">
        <span>+ Lançar · ${state.finDate.split('-').reverse().join('/')}</span>
        ${selTotal>0?`<span style="font-family:var(--mono);font-size:10px;color:var(--gold)">${fmtBRL(selTotal)}</span>`:''}
      </div>
      <div class="add-form-body">
        <div class="field-row">
          <div class="field" style="flex:2"><label>Item</label><input type="text" id="fin-name" value="${f.name}" placeholder="ex: Peito de frango" oninput="updateFinForm('name',this.value)"/></div>
          <div class="field"><label>R$</label><input type="number" id="fin-val" value="${f.val}" placeholder="0,00" min="0" step="0.01" oninput="updateFinForm('val',this.value)"/></div>
        </div>
        <div class="field-row"><div class="field"><label>Categoria</label><select id="fin-cat" onchange="updateFinForm('cat',this.value)">${FIN_CATS.map(c=>`<option value="${c}"${f.cat===c?' selected':''}>${c}</option>`).join('')}</select></div></div>
        <button class="add-btn" onclick="addPurchase()">ADICIONAR</button>
      </div>
      <div style="padding:0 16px 14px;position:relative;z-index:1">${purchaseList}</div>
    </div>

    ${sortedWeeks.length>0?`<div class="history" style="margin-top:8px;margin-bottom:14px"><div class="sum-label" style="margin-bottom:10px">Histórico semanal</div>${histRows}</div>`:''}
    <div style="height:10px"></div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// PESO SECTION (inside dashboard)
// ═══════════════════════════════════════════════════════
function renderPesoSection(){
  const sorted=[...state.weights].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const log=sorted.length===0
    ?`<div style="text-align:center;padding:20px 0"><div style="font-size:32px;opacity:.2;margin-bottom:8px">⚖️</div><div style="font-family:var(--mono);font-size:10px;color:var(--text3)">Nenhum registro ainda.<br>O primeiro passo é sempre<br>o mais importante.</div></div>`
    :sorted.map((w,i)=>{
      const next=sorted[i+1];
      const diff=next?(w.val-next.val).toFixed(1):null;
      const diffColor=diff===null?'':parseFloat(diff)<0?'#30D158':'#FF6B6B';
      return `<div class="wlog-row">
        <div class="wlog-date">${fmtDate(w.date)}</div>
        <div class="wlog-right">
          ${diff!==null?`<div class="wlog-diff" style="color:${diffColor}">${parseFloat(diff)<=0?'▼':'▲'}${Math.abs(diff)}kg</div>`:''}
          <div class="wlog-val">${w.val} kg</div>
          <button class="wlog-del" onclick="deleteWeight('${w.date}')">×</button>
        </div>
      </div>`;
    }).join('');

  return `<div class="weight-section">
    <div class="section-label">Registrar peso</div>
    <div class="weight-input-row">
      <input type="number" step="0.1" min="40" max="300" placeholder="103.5" value="${state.weightInput}" oninput="setState({weightInput:this.value})" id="weight-inp"/>
      <div class="w-unit">kg</div>
      <button class="w-add-btn" onclick="addWeight()">Registrar</button>
    </div>
    <div class="chart-wrap">${weightChart(state.weights)}</div>
    <div class="weight-log" style="margin-top:12px">${log}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// RENDER MEAL PREP
// ═══════════════════════════════════════════════════════
function renderMealPrep(){
  const total=PREP_ITEMS.length;
  const done=PREP_ITEMS.filter(i=>(state.prepStock[i.name]||0)>0).length;
  const pct=Math.round(done/total*100);
  const cards=PREP_ITEMS.map(item=>{
    const qty=state.prepStock[item.name]||0;
    const isDone=qty>0;
    return `<div class="prep-card fade-up">
      <div class="prep-hdr">
        <div class="prep-title">${item.name}</div>
        <div class="prep-badge ${isDone?'done':'todo'}">${isDone?'preparado':'pendente'}</div>
      </div>
      <div class="prep-portions">
        <span>${item.unit}</span>
        <div class="prep-controls">
          <button class="prep-btn" onclick="adjPrep('${item.name}',-1)">−</button>
          <div class="prep-num">${qty}</div>
          <button class="prep-btn" onclick="adjPrep('${item.name}',1)">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
  return `<div class="wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div><div class="sum-label">Meal Prep da Semana</div><div style="font-family:var(--mono);font-size:13px;color:var(--text)">${done}/${total} preparados</div></div>
      <div style="font-family:var(--mono);font-size:12px;color:${pct===100?'var(--green)':'var(--gold)'}">${pct}%</div>
    </div>
    ${cards}
    <button onclick="clearPrep()" style="width:100%;padding:10px;background:transparent;border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-xs);font-family:var(--mono);font-size:10px;color:var(--text3);cursor:pointer;margin-top:4px;transition:all .2s">Zerar estoque</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// RENDER MAIN
// ═══════════════════════════════════════════════════════
function render(){
  const map={
    dashboard:renderDashboard,
    dieta:renderDieta,
    compras:renderCompras,
    receitas:renderReceitas,
    financeiro:renderFinanceiro,
  };
  if(state.tab==='peso'){
    const greet=getGreeting();
    document.getElementById('app').innerHTML=hdr('Peso & Evolução',greet.sub,ring(0,'#30D158','⚖️'),'dieta')+
      `<div class="scroll">${renderPesoSection()}</div>`;
    return;
  }
  if(state.tab==='mealprep'){
    const done=PREP_ITEMS.filter(i=>(state.prepStock[i.name]||0)>0).length;
    const pct=Math.round(done/PREP_ITEMS.length*100);
    const greet=getGreeting();
    document.getElementById('app').innerHTML=hdr('Meal Prep',greet.sub,ring(pct,'#0A84FF'),'dieta')+
      `<div class="scroll">${renderMealPrep()}</div>`;
    return;
  }
  document.getElementById('app').innerHTML=(map[state.tab]||renderDashboard)();
  initSwipe();
}

// ═══════════════════════════════════════════════════════
// SWIPE GESTURE
// ═══════════════════════════════════════════════════════
function initSwipe(){
  document.querySelectorAll('[data-key]').forEach(row=>{
    let startX=0,startY=0,moved=false;
    row.addEventListener('touchstart',e=>{
      startX=e.touches[0].clientX;startY=e.touches[0].clientY;moved=false;
    },{passive:true});
    row.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-startX;
      const dy=Math.abs(e.touches[0].clientY-startY);
      if(dy>20) return;
      if(dx>10) moved=true;
      if(moved&&dx>0){
        row.style.transform=`translateX(${Math.min(dx*.5,40)}px)`;
        const bg=document.getElementById('bg-'+row.dataset.key);
        if(bg) bg.style.opacity=Math.min(dx/80,1);
      }
    },{passive:true});
    row.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-startX;
      row.style.transform='';
      row.style.transition='transform .3s cubic-bezier(.34,1.2,.64,1)';
      setTimeout(()=>row.style.transition='',300);
      const bg=document.getElementById('bg-'+row.dataset.key);
      if(bg){bg.style.opacity=0}
      if(moved&&dx>60){
        toggleFood(row.dataset.key);
      }
    },{passive:true});
  });
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
window.setTab=t=>setState({tab:t,showFocus:false});
window.setDay=i=>setState({day:i});
window.toggleFood=key=>{
  const c={...state.checked};c[key]=!c[key];
  if(navigator.vibrate) navigator.vibrate(c[key]?[10]:[5]);
  setState({checked:c});
  const day=DAYS[getTodayIdx()];
  const pct=getDayProg(day);
  if(pct===100){setTimeout(()=>launchConfetti(),100)}
};
window.toggleShop=key=>{const c={...state.shopChecked};c[key]=!c[key];setState({shopChecked:c})};
window.clearShop=()=>setState({shopChecked:{}});
window.dismissInstall=()=>setState({showInstall:false});
window.setRecipeFilter=f=>setState({recipeFilter:f});
window.toggleRecipe=key=>{const e={...state.expanded};e[key]=!e[key];setState({expanded:e})};
window.setFinDate=d=>setState({finDate:d});
window.updateFinForm=(k,v)=>setState({finForm:{...state.finForm,[k]:v}});
window.prevMonth=()=>{const d=new Date(state.finDate+'T00:00:00');d.setDate(1);d.setMonth(d.getMonth()-1);setState({finDate:`${d.getFullYear()}-${pad(d.getMonth()+1)}-01`})};
window.nextMonth=()=>{const d=new Date(state.finDate+'T00:00:00');d.setDate(1);d.setMonth(d.getMonth()+1);setState({finDate:`${d.getFullYear()}-${pad(d.getMonth()+1)}-01`})};
window.addPurchase=()=>{
  const f=state.finForm;
  if(!f.name.trim()||!f.val||isNaN(parseFloat(f.val)))return;
  const p={id:Date.now().toString(),date:state.finDate,name:f.name.trim(),cat:f.cat,val:parseFloat(f.val)};
  setState({purchases:[...state.purchases,p],finForm:{name:'',cat:FIN_CATS[0],val:''}});
  setTimeout(()=>{const el=document.getElementById('fin-name');if(el)el.focus()},50);
};
window.deletePurchase=id=>setState({purchases:state.purchases.filter(p=>p.id!==id)});
window.saveMeta=()=>{const el=document.getElementById('meta-input');if(el&&!isNaN(parseFloat(el.value)))setState({finMeta:parseFloat(el.value),finMetaEdit:false})};
window.addWeight=()=>{
  const v=parseFloat(state.weightInput);
  if(isNaN(v)||v<30||v>300)return;
  const today=todayStr();
  const filtered=state.weights.filter(w=>w.date!==today);
  if(navigator.vibrate) navigator.vibrate([20,30,50]);
  setState({weights:[...filtered,{date:today,val:v}].sort((a,b)=>a.date.localeCompare(b.date)),weightInput:''});
};
window.deleteWeight=date=>setState({weights:state.weights.filter(w=>w.date!==date)});
window.setEvalOpt=(k,v)=>setState({evalForm:{...state.evalForm,[k]:v}});
window.saveEval=()=>{
  const f=state.evalForm;
  if(!f.humor&&!f.energia&&!f.fome&&!f.nota)return;
  const ev={...state.evals,[state.evalDay]:{...f}};
  if(navigator.vibrate) navigator.vibrate([15,20,40]);
  setState({evals:ev,evalForm:{humor:'',energia:'',fome:'',nota:''}});
};
window.adjPrep=(name,delta)=>{
  const s={...state.prepStock};s[name]=Math.max(0,(s[name]||0)+delta);
  setState({prepStock:s});
};
window.clearPrep=()=>setState({prepStock:{}});
window.goTo=t=>setState({tab:t});

// ═══ KEYBOARD SHORTCUTS ═══════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  const tabMap={'1':'dashboard','2':'dieta','3':'compras','4':'receitas','5':'financeiro'};
  if(tabMap[e.key]) setState({tab:tabMap[e.key]});
  if(e.key==='ArrowLeft'&&state.tab==='dieta') setState({day:Math.max(0,state.day-1)});
  if(e.key==='ArrowRight'&&state.tab==='dieta') setState({day:Math.min(6,state.day+1)});
  if(e.key==='Escape'&&state.showFocus) setState({showFocus:false});
});

// ═══ INIT ═════════════════════════════════════════════
render();
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
