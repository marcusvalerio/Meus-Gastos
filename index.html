<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fluxo"/>
<meta name="theme-color" content="#000000"/>
<title>Fluxo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── FLUXO PALETTE ── */
  --black:#000000;
  --bg:#080808;
  --s1:#0f0f0f;
  --s2:#161616;
  --s3:#1c1c1e;
  --s4:#2c2c2e;
  --border:#222224;
  --border-hi:#333336;

  --text:#f2f2f2;
  --text-2:#8e8e93;
  --text-3:#48484a;
  --text-4:#2c2c2e;

  /* accents — used sparingly */
  --green:#30d158;
  --green-dim:rgba(48,209,88,.12);
  --green-border:rgba(48,209,88,.2);
  --blue:#0a84ff;
  --blue-dim:rgba(10,132,255,.10);
  --amber:#ff9f0a;
  --amber-dim:rgba(255,159,10,.10);
  --red:#ff453a;

  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);

  --ease-out:cubic-bezier(.16,1,.3,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --swift:cubic-bezier(.4,0,.2,1);
}

html,body{
  height:100%;background:var(--black);color:var(--text);
  font-family:var(--sans);-webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ── APP SHELL ── */
#app{
  max-width:430px;margin:0 auto;min-height:100vh;
  display:flex;flex-direction:column;position:relative;
}

/* ── TAB BAR ── */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  padding:10px 8px calc(var(--safe-bottom) + 10px);
  background:rgba(8,8,8,.92);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;
  z-index:200;
  /* frosted — subtle, not decorative */
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.ti{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:4px 8px;border:none;background:transparent;cursor:pointer;
  -webkit-tap-highlight-color:transparent;flex:1;
  transition:transform .18s var(--spring);
}
.ti:active{transform:scale(.88)}
.ti-icon{
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;transition:background .2s,transform .25s var(--spring);
}
.ti.active .ti-icon{transform:scale(1.06)}
.ti svg{width:18px;height:18px;stroke-width:1.7;transition:stroke .2s}
.ti svg{stroke:var(--text-3)}
.ti.active svg{stroke:var(--green)}
.ti-label{
  font-size:10px;font-weight:500;letter-spacing:.1px;
  color:var(--text-3);transition:color .2s;
  font-family:var(--mono);
}
.ti.active .ti-label{color:var(--green)}

/* ── SCROLL ── */
.scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:calc(76px + var(--safe-bottom));
  padding-top:calc(var(--safe-top) + 20px);
}
.scroll::-webkit-scrollbar{display:none}

/* ── PAGE ENTER ── */
.page{animation:pageIn .28s var(--ease-out) both}
@keyframes pageIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── STAGGER ── */
.stagger>*{animation:fadeUp .32s var(--ease-out) both}
.stagger>*:nth-child(1){animation-delay:.03s}
.stagger>*:nth-child(2){animation-delay:.07s}
.stagger>*:nth-child(3){animation-delay:.11s}
.stagger>*:nth-child(4){animation-delay:.15s}
.stagger>*:nth-child(5){animation-delay:.19s}
.stagger>*:nth-child(6){animation-delay:.23s}
.stagger>*:nth-child(7){animation-delay:.27s}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── SECTION HEADER ── */
.ph{padding:0 20px 20px}
.ph-eyebrow{
  font-family:var(--mono);font-size:10px;letter-spacing:2px;
  color:var(--text-3);text-transform:uppercase;margin-bottom:6px;
}
.ph-title{
  font-size:28px;font-weight:600;letter-spacing:-.6px;
  color:var(--text);line-height:1.1;
}
.ph-title span{color:var(--green)}

/* ── CARD ── */
.card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;margin-bottom:10px;
  transition:border-color .2s;
}
.card.done{border-color:var(--green-border);background:rgba(48,209,88,.03)}
.card-hdr{
  padding:13px 18px 11px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card.done .card-hdr{border-bottom-color:rgba(48,209,88,.1)}
.card-title{
  display:flex;align-items:center;gap:9px;
  font-size:13px;font-weight:600;color:var(--text-2);
  letter-spacing:.1px;
}
.card.done .card-title{color:var(--green)}
.card-icon{
  width:26px;height:26px;border-radius:8px;
  background:var(--s3);display:flex;align-items:center;justify-content:center;
}
.card-icon svg{width:13px;height:13px;stroke:var(--text-2);stroke-width:1.8}
.card.done .card-icon{background:var(--green-dim)}
.card.done .card-icon svg{stroke:var(--green)}
.card-count{font-family:var(--mono);font-size:11px;color:var(--text-3)}
.card.done .card-count{color:var(--green)}

/* ── ROW ── */
.row{
  display:flex;align-items:center;gap:13px;padding:11px 18px;
  cursor:pointer;transition:background .12s;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.row:active{background:rgba(255,255,255,.02)}
.row.chk{background:transparent}

/* ── CHECKBOX ── */
.chkbox{
  width:22px;height:22px;border-radius:7px;
  border:1.5px solid var(--s4);background:transparent;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .18s var(--spring),border-color .18s,transform .2s var(--spring);
}
.chkbox.chk{
  background:var(--green);border-color:var(--green);
  transform:scale(1.04);
  box-shadow:0 0 0 3px rgba(48,209,88,.12);
}
.chkbox.blue{border-color:rgba(10,132,255,.4)}
.chkbox svg{display:none}
.chkbox.chk svg{display:block}
.fname{
  flex:1;font-size:13.5px;font-weight:400;color:var(--text);
  transition:color .2s,opacity .2s;
}
.row.chk .fname{color:var(--text-3);text-decoration:line-through;text-decoration-color:var(--s4)}
.fname.cr{color:var(--blue);font-style:italic}
.row.chk .fname.cr{color:var(--text-3)}
.fqty{font-family:var(--mono);font-size:10px;color:var(--text-3);flex-shrink:0}
.row.chk .fqty{opacity:.35}

/* ── RING ── */
.ring-wrap{position:relative;width:48px;height:48px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--s3);stroke-width:3}
.ring-fill{fill:none;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease-out),stroke .4s}
.ring-lbl{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:500;line-height:1;
}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px}
.stat-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;
}
.stat-card.full{grid-column:1/-1}
.stat-card.hi{border-color:var(--green-border);background:rgba(48,209,88,.03)}
.slabel{
  font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--text-3);text-transform:uppercase;margin-bottom:8px;
}
.sval{
  font-family:var(--mono);font-size:22px;font-weight:500;
  color:var(--text);line-height:1;
  font-variant-numeric:tabular-nums;
}
.sval.green{color:var(--green)}
.sval.amber{color:var(--amber)}
.sval.sm{font-size:17px}
.ssub{font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:5px}

/* ── PROGRESS BAR ── */
.pbar-wrap{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:10px}
.pbar-fill{height:100%;border-radius:2px;transition:width 1s var(--ease-out)}

/* ── DAY PICKER ── */
.day-picker{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:5px;padding:0 20px;margin-bottom:16px;
}
.day-btn{
  padding:8px 2px;border-radius:11px;border:1px solid var(--border);
  background:transparent;cursor:pointer;text-align:center;
  transition:all .2s var(--spring);-webkit-tap-highlight-color:transparent;
}
.day-btn:active{transform:scale(.9)}
.day-btn.sel{border-color:var(--green-border);background:var(--green-dim)}
.day-name{font-family:var(--mono);font-size:7px;letter-spacing:.5px;color:var(--text-4);text-transform:uppercase;margin-bottom:3px}
.day-btn.sel .day-name{color:var(--green)}
.day-dot{width:3px;height:3px;border-radius:50%;background:var(--green);margin:0 auto 3px}
.day-prog{font-family:var(--mono);font-size:7px;color:var(--text-4)}
.day-prog.done{color:var(--green)}.day-prog.part{color:var(--amber)}

/* ── DONE BANNER ── */
.done-banner{
  text-align:center;padding:24px 20px;
  border-radius:16px;border:1px solid var(--green-border);
  background:rgba(48,209,88,.04);margin-top:4px;
  animation:scaleIn .4s var(--spring) both;
}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.done-banner .dt{font-size:15px;font-weight:600;color:var(--green);margin-bottom:3px;letter-spacing:-.2px}
.done-banner .ds{font-family:var(--mono);font-size:9px;color:rgba(48,209,88,.4);letter-spacing:2px}

/* ── CONFETTI ── */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:500;overflow:hidden}
.confetti-piece{
  position:absolute;width:6px;height:10px;
  border-radius:2px;opacity:0;
  animation:confettiFall 1.4s var(--ease-out) forwards;
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(-20px) rotate(0deg)}
  80%{opacity:.8}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}

/* ── SHOP ── */
.shop-sum{
  margin:0 20px 12px;padding:14px 18px;border-radius:14px;
  background:var(--s1);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sum-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-3);margin-bottom:3px;text-transform:uppercase}
.sum-count{font-family:var(--mono);font-size:13px;color:var(--text)}
.clr-btn{
  font-family:var(--mono);font-size:10px;color:var(--text-2);
  background:transparent;border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;cursor:pointer;
  transition:all .18s;-webkit-tap-highlight-color:transparent;
}
.clr-btn:active{background:var(--s3);transform:scale(.94)}
.shop-info{flex:1}
.shop-irow{display:flex;align-items:center;justify-content:space-between}
.sname{font-size:13.5px;color:var(--text)}
.row.chk .sname{color:var(--text-3);text-decoration:line-through;text-decoration-color:var(--s4)}
.sqty{font-family:var(--mono);font-size:10px;color:var(--text-3);flex-shrink:0;margin-left:6px}
.row.chk .sqty{opacity:.35}
.stip{font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:2px}
.row.chk .stip{opacity:.3}

/* ── FINANCEIRO ── */
.cal-wrap{padding:0 20px}
.cal-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--text-2);text-transform:uppercase}
.cal-nav{display:flex;gap:6px}
.cal-nav button{
  background:var(--s1);border:1px solid var(--border);
  border-radius:8px;color:var(--text-2);font-family:var(--mono);font-size:13px;
  padding:4px 11px;cursor:pointer;transition:all .18s;
  -webkit-tap-highlight-color:transparent;
}
.cal-nav button:active{background:var(--s3);transform:scale(.9)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-family:var(--mono);font-size:7px;color:var(--text-4);text-align:center;padding-bottom:5px;text-transform:uppercase}
.cal-day{
  aspect-ratio:1;border-radius:9px;border:1px solid var(--border);
  background:transparent;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:all .18s var(--spring);-webkit-tap-highlight-color:transparent;
}
.cal-day:active{transform:scale(.86)}
.cal-day.today{border-color:rgba(255,159,10,.35)}
.cal-day.has-p{border-color:var(--green-border);background:rgba(48,209,88,.04)}
.cal-day.sel{border-color:rgba(48,209,88,.5);background:rgba(48,209,88,.08)}
.cal-day.empty{cursor:default;border-color:transparent}
.cal-num{font-family:var(--mono);font-size:10px;color:var(--text-2);line-height:1}
.cal-day.today .cal-num{color:var(--amber)}
.cal-day.has-p .cal-num{color:var(--green)}
.cal-dot{width:3px;height:3px;border-radius:50%;background:var(--green)}
.add-form{
  margin:0 20px;background:var(--s1);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
}
.add-form-hdr{
  padding:13px 18px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--text);
  display:flex;align-items:center;justify-content:space-between;letter-spacing:-.1px;
}
.add-form-body{padding:14px 18px}
.field-row{display:flex;gap:8px;margin-bottom:10px}
.field{flex:1;display:flex;flex-direction:column;gap:5px}
.field label{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase}
.field input,.field select{
  background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;color:var(--text);
  font-family:var(--sans);font-size:13px;outline:none;width:100%;
  transition:border-color .2s;-webkit-appearance:none;
}
.field input:focus,.field select:focus{border-color:rgba(48,209,88,.4)}
.field select option{background:#0f0f0f}
.add-btn{
  width:100%;padding:12px;background:var(--green-dim);
  border:1px solid var(--green-border);border-radius:12px;
  color:var(--green);font-family:var(--mono);font-size:11px;letter-spacing:1.5px;
  cursor:pointer;transition:all .18s var(--spring);-webkit-tap-highlight-color:transparent;
}
.add-btn:active{transform:scale(.98);background:rgba(48,209,88,.18)}
.purchase-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.purchase-item:last-child{border-bottom:none}
.pi-left{flex:1}
.pi-name{font-size:13px;color:var(--text)}
.pi-cat{font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:2px}
.pi-val{font-family:var(--mono);font-size:12px;color:var(--green);flex-shrink:0;margin-left:8px}
.pi-del{
  background:none;border:none;color:var(--text-3);font-size:17px;
  cursor:pointer;padding:0 0 0 10px;
  transition:color .18s,transform .18s;
}
.pi-del:active{color:var(--red);transform:scale(1.2)}
.cat-bars{padding:0 20px;margin-bottom:14px}
.cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cat-bar-name{font-family:var(--mono);font-size:9px;color:var(--text-2);width:70px;flex-shrink:0;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-bar-track{flex:1;height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px;transition:width .8s var(--ease-out);background:var(--green)}
.cat-bar-val{font-family:var(--mono);font-size:9px;color:var(--text-2);width:56px;text-align:right;flex-shrink:0}
.hist-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.hist-row:last-child{border-bottom:none}
.hist-week{font-family:var(--mono);font-size:10px;color:var(--text-2)}
.hist-val{font-family:var(--mono);font-size:11px;color:var(--text)}

/* ── RECEITAS ── */
.recipe-filter{
  display:flex;gap:6px;padding:0 20px;margin-bottom:14px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.recipe-filter::-webkit-scrollbar{display:none}
.filt-btn{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  font-family:var(--mono);font-size:9px;letter-spacing:.8px;color:var(--text-2);
  cursor:pointer;transition:all .18s var(--spring);white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.filt-btn:active{transform:scale(.92)}
.filt-btn.active{border-color:var(--green-border);color:var(--green);background:var(--green-dim)}
.recipes-wrap{padding:0 20px}
.recipe-card{margin-bottom:10px;border-radius:16px;background:var(--s1);border:1px solid var(--border);overflow:hidden}
.recipe-card-hdr{
  padding:14px 18px 11px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.recipe-name{font-size:14px;font-weight:600;color:var(--text);flex:1;letter-spacing:-.15px}
.recipe-badges{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge-freeze{
  font-family:var(--mono);font-size:9px;color:var(--blue);
  background:var(--blue-dim);border:1px solid rgba(10,132,255,.2);
  border-radius:6px;padding:2px 7px;
}
.badge-cat{
  font-family:var(--mono);font-size:9px;letter-spacing:.5px;color:var(--text-3);
  background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:2px 7px;
}
.recipe-body{padding:12px 18px 14px}
.recipe-section{
  font-family:var(--mono);font-size:8px;letter-spacing:2px;
  color:var(--text-3);text-transform:uppercase;margin-bottom:6px;margin-top:12px;
}
.recipe-section:first-child{margin-top:0}
.recipe-ingr{font-size:12px;color:var(--text-2);line-height:1.8}
.recipe-step{display:flex;gap:10px;margin-bottom:7px;font-size:13px;color:var(--text);line-height:1.5}
.step-num{font-family:var(--mono);font-size:10px;color:var(--green);flex-shrink:0;margin-top:2px;width:14px}
.recipe-tip{
  margin-top:10px;padding:10px 12px;background:var(--s2);
  border-left:2px solid var(--s4);border-radius:0 8px 8px 0;
  font-size:12px;color:var(--text-2);font-style:italic;line-height:1.6;
}
.recipe-expand{
  width:100%;padding:11px;background:transparent;
  border:none;border-top:1px solid var(--border);
  font-family:var(--mono);font-size:9px;letter-spacing:1px;
  color:var(--text-3);cursor:pointer;transition:background .18s,color .18s;
  -webkit-tap-highlight-color:transparent;
}
.recipe-expand:active{background:var(--s2);color:var(--text)}

/* ── EVAL ── */
.eval-section{padding:0 20px;margin-bottom:20px}
.eval-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:7px}
.eval-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.eval-opt{
  padding:7px 14px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  font-size:12px;font-family:var(--sans);cursor:pointer;
  transition:all .18s var(--spring);-webkit-tap-highlight-color:transparent;
  color:var(--text-2);
}
.eval-opt:active{transform:scale(.92)}
.eval-opt.sel{border-color:var(--green-border);background:var(--green-dim);color:var(--green)}
.eval-save{
  width:100%;padding:12px;background:var(--green-dim);
  border:1px solid var(--green-border);border-radius:12px;

// HELPERS
// ══════════════════════════════════════════
function getDayProg(dayName){
  const dm=MEALS[dayName];let t=0,d=0;
  MEAL_ORDER.forEach(m=>dm[m].forEach((_,i)=>{t++;if(S.checked[`${dayName}__${m}__${i}`])d++;}));
  return t===0?0:Math.round(d/t*100);
}
function fmtBRL(v){return 'R$\u00a0'+Number(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
function fmtDate(str){if(!str)return '';const[,m,d]=str.split('-');return `${d}/${m}`}
function fmtFull(str){if(!str)return '';const[y,m,d]=str.split('-');return `${d}/${m}/${y}`}

function ring(pct,color,label){
  const r=20,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  const lbl=label!==undefined?label:`${pct}%`;
  return `<div class="ring-wrap"><svg width="48" height="48" viewBox="0 0 48 48"><circle class="ring-bg" cx="24" cy="24" r="${r}"/><circle class="ring-fill" cx="24" cy="24" r="${r}" stroke="${color}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/></svg><div class="ring-lbl" style="color:${color}">${lbl}</div></div>`;
}
function chkbox(checked,blue){
  const cls=['chkbox',checked?'chk':'',blue&&!checked?'blue':''].join(' ').trim();
  return `<div class="${cls}"><svg width="10" height="8" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
}

function weightChart(weights){
  if(weights.length<2)return `<div class="no-data">Registre ao menos 2 pesagens para ver o gráfico</div>`;
  const sorted=[...weights].sort((a,b)=>a.date.localeCompare(b.date)).slice(-14);
  const vals=sorted.map(w=>w.val);
  const mn=Math.min(...vals)-.5,mx=Math.max(...vals)+.5;
  const W=320,H=90,pd=20;
  const x=i=>pd+(i/(sorted.length-1))*(W-pd*2);
  const y=v=>H-pd-((v-mn)/(mx-mn))*(H-pd*2);
  const pts=sorted.map((w,i)=>`${x(i)},${y(w.val)}`).join(' ');
  const area=`${pd},${H-pd} `+sorted.map((w,i)=>`${x(i)},${y(w.val)}`).join(' ')+` ${W-pd},${H-pd}`;
  const vl=sorted.map((w,i)=>`<text x="${x(i)}" y="${y(w.val)-5}" fill="rgba(142,142,147,.5)" font-size="7" text-anchor="middle" font-family="'DM Mono',monospace">${w.val}</text>`).join('');
  const dl=sorted.filter((_,i)=>i===0||i===sorted.length-1).map(w=>{const oi=sorted.indexOf(w);return `<text x="${x(oi)}" y="${H-2}" fill="rgba(72,72,74,.8)" font-size="7" text-anchor="middle" font-family="'DM Mono',monospace">${fmtDate(w.date)}</text>`;}).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#30d158" stop-opacity=".2"/><stop offset="100%" stop-color="#30d158" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#wg)"/>
    <polyline points="${pts}" fill="none" stroke="#30d158" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${sorted.map((w,i)=>`<circle cx="${x(i)}" cy="${y(w.val)}" r="2.5" fill="#30d158"/>`).join('')}
    ${vl}${dl}
  </svg></div>`;
}

function calcStreak(){
  let streak=0;
  for(let i=0;i<90;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const idx=d.getDay()===0?6:d.getDay()-1;
    if(getDayProg(DAYS[idx])===100)streak++;
    else if(i===0)continue;
    else break;
  }
  return streak;
}

function weekInsight(){
  const doneCount=DAYS.filter(d=>getDayProg(d)===100).length;
  const pct=Math.round(DAYS.reduce((a,d)=>a+getDayProg(d),0)/7);
  if(doneCount>=6)return `<strong>${doneCount} dias completos</strong> esta semana. Semana quase perfeita.`;
  if(doneCount>=4)return `<strong>${doneCount} dias completos</strong>. Consistência acima da média.`;
  if(pct>50)return `Média de <strong>${pct}%</strong> por dia esta semana.`;
  return `Cada refeição marcada conta. <strong>Começar de onde está.</strong>`;
}

function fireConfetti(){
  const root=document.getElementById('confetti-root');

  const colors=['#30d158','#0a84ff','#ff9f0a','#f2f2f2','#8e8e93'];
  for(let i=0;i<40;i++){

    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;top:0;background:${colors[i%colors.length]};animation-delay:${Math.random()*.6}s;animation-duration:${1.2+Math.random()*.6}s;transform:rotate(${Math.random()*360}deg)`;

      <div class="field-row">
        <div class="field"><label>Tipo</label><select onchange="ss({treinoForm:{...S.treinoForm,tipo:this.value}})">${TREINO_TIPOS.map(t=>`<option value="${t}"${tf.tipo===t?' selected':''}>${t}</option>`).join('')}</select></div>
        <div class="field"><label>Duração (min)</label><input type="number" placeholder="60" value="${tf.duracao}" oninput="ss({treinoForm:{...S.treinoForm,duracao:this.value}})"/></div>
      </div>
      <div class="field" style="margin-bottom:10px"><label>Exercícios (separados por vírgula)</label><input type="text" placeholder="Supino, Agachamento, Rosca..." value="${tf.exercicios}" oninput="ss({treinoForm:{...S.treinoForm,exercicios:this.value}})"/></div>
      <div class="field" style="margin-bottom:12px"><label>Observações</label><input type="text" placeholder="Sensações, cargas, PR..." value="${tf.notas}" oninput="ss({treinoForm:{...S.treinoForm,notas:this.value}})"/></div>
      <button class="add-btn" onclick="addTreino()">SALVAR TREINO</button>
    </div>
  </div>`;

  // log de peso
  const wlog=sortedW.slice(0,6).map((w,i)=>{
    const next=sortedW[i+1];
    const diff=next?(w.val-next.val).toFixed(1):null;
    const dc=diff===null?'':parseFloat(diff)<0?'#30d158':'#ff453a';
    return `<div class="wlog-row"><div class="wlog-date">${fmtFull(w.date)}</div><div class="wlog-right">${diff!==null?`<div class="wlog-diff" style="color:${dc}">${parseFloat(diff)<=0?'▼':'▲'}${Math.abs(diff)} kg</div>`:''}<div class="wlog-val">${w.val} kg</div><button class="wlog-del" onclick="deleteWeight('${w.date}')">×</button></div></div>`;
  }).join('');

  return `<div class="scroll page">
    <div class="ph">
      <div class="ph-eyebrow">Evolução</div>
      <div class="ph-title">Progresso</div>
    </div>

    <!-- hero peso -->
    <div class="prog-hero">
      <div class="prog-hero-label">Peso atual</div>
      <div class="prog-hero-weight">${lw?lw.val:'—'}<span>kg</span></div>
      ${wDiff!==null?`<div class="prog-hero-diff" style="color:${parseFloat(wDiff)<=0?'#30d158':'#ff453a'}">${parseFloat(wDiff)<=0?'▼':'▲'} ${Math.abs(wDiff)} kg desde anterior</div>`:''}
      ${totalDiff!==null?`<div class="prog-hero-sub">${parseFloat(totalDiff)<=0?'▼ '+Math.abs(totalDiff)+' kg no total':'▲ +'+totalDiff+' kg no total'}</div>`:''}
    </div>

    <!-- registro peso -->
    <div style="margin:0 20px 12px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:16px 18px">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:12px">Registrar hoje</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" step="0.1" min="40" max="300" placeholder="103.5" value="${S.weightInput}" oninput="ss({weightInput:this.value})" style="background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-family:var(--mono);font-size:15px;outline:none;width:110px;font-variant-numeric:tabular-nums;transition:border-color .2s;-webkit-appearance:none" onfocus="this.style.borderColor='rgba(48,209,88,.4)'" onblur="this.style.borderColor='var(--border)'"/>
        <span style="font-family:var(--mono);font-size:12px;color:var(--text-3)">kg</span>
        <button onclick="addWeight()" style="padding:9px 18px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:10px;color:var(--green);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .18s var(--spring);-webkit-tap-highlight-color:transparent" ontouchstart="this.style.transform='scale(.94)'" ontouchend="this.style.transform=''">Registrar</button>
      </div>
    </div>

    <!-- gráfico -->
    <div style="padding:0 20px;margin-bottom:12px">
      ${weightChart(S.weights)}
    </div>

    <!-- log peso -->
    ${sortedW.length>0?`<div style="margin:0 20px 14px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:14px 18px">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Histórico</div>
      ${wlog}
    </div>`:''}

    <!-- semana -->
    <div style="padding:0 20px;margin-bottom:6px">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Semana — dieta + treino</div>
    </div>
    <div class="prog-week">${weekCells}</div>
    <div style="padding:0 20px;display:flex;gap:12px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:#30d158"></div><span style="font-family:var(--mono);font-size:9px;color:var(--text-3)">Dieta</span></div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:#0a84ff"></div><span style="font-family:var(--mono);font-size:9px;color:var(--text-3)">Treino</span></div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:#ff9f0a"></div><span style="font-family:var(--mono);font-size:9px;color:var(--text-3)">Parcial</span></div>
    </div>

    <!-- form treino -->
    ${treinoForm}

    <div class="sp"></div>

    <!-- treinos recentes -->
    <div style="padding:0 20px;margin-bottom:8px">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:12px">Treinos recentes</div>
      ${treinoCards}
    </div>
    <div class="sp16"></div>
  </div>`;
}

function renderCompras(){
  const total=SHOPPING.reduce((a,c)=>a+c.items.length,0);
  const done=Object.values(S.shopChecked).filter(Boolean).length;
  const pct=Math.round(done/total*100);
  const cards=SHOPPING.map((cat,ci)=>{
    const catDone=cat.items.filter((_,i)=>S.shopChecked[`${ci}_${i}`]).length,allDone=catDone===cat.items.length;
    const rows=cat.items.map((food,ii)=>{
      const key=`${ci}_${ii}`,isCk=!!S.shopChecked[key];
      return `<div class="row${isCk?' chk':''}" onclick="toggleShop('${key}')">${chkbox(isCk,false)}<div class="shop-info"><div class="shop-irow"><span class="sname">${food.item}</span><span class="sqty">${food.qty}</span></div>${food.tip?`<div class="stip">${food.tip}</div>`:''}</div></div>`;
    }).join('');
    return `<div class="card${allDone?' done':''}"><div class="card-hdr"><div class="card-title" style="color:${allDone?'#30d158':cat.color}">${cat.cat}</div><div class="card-count">${catDone}/${cat.items.length}</div></div>${rows}</div>`;
  }).join('');
  const banner=done===total?`<div class="done-banner"><div class="dt">Compras completas</div><div class="ds">SEMANA GARANTIDA</div></div>`:'';
  return `<div class="scroll page">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 16px">
      <div>
        <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:5px">Mercado</div>
        <div style="font-size:24px;font-weight:600;letter-spacing:-.4px">Lista</div>
      </div>
      ${ring(pct,'#30d158')}
    </div>
    <div class="shop-sum"><div><div class="sum-label">Semana completa</div><div class="sum-count">${done} de ${total} itens</div></div><button class="clr-btn" onclick="clearShop()">Limpar</button></div>
    <div class="wrap stagger">${cards}${banner}</div>
    <div class="sp16"></div>
  </div>`;
}

// ══════════════════════════════════════════
// PAGE: FINANCEIRO
// ══════════════════════════════════════════
function renderFinanceiro(){
  const ps=S.purchases,now=new Date();
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay()+(now.getDay()===0?-6:1));weekStart.setHours(0,0,0,0);
  const thisWeekPs=ps.filter(p=>new Date(p.date+'T00:00:00')>=weekStart);
  const weekTotal=thisWeekPs.reduce((a,p)=>a+p.val,0);
  const allTotal=ps.reduce((a,p)=>a+p.val,0);
  const metaPct=Math.min(100,Math.round(weekTotal/S.finMeta*100));
  const metaColor=metaPct>90?'#ff453a':metaPct>70?'#ff9f0a':'#30d158';
  const catTotals={};thisWeekPs.forEach(p=>{catTotals[p.cat]=(catTotals[p.cat]||0)+p.val});
  const maxCat=Math.max(...Object.values(catTotals),1);
  const weeklyMap={};ps.forEach(p=>{const d=new Date(p.date+'T00:00:00'),ws=new Date(d);ws.setDate(d.getDate()-d.getDay()+(d.getDay()===0?-6:1));const wk=`${ws.getFullYear()}-${_p(ws.getMonth()+1)}-${_p(ws.getDate())}`;weeklyMap[wk]=(weeklyMap[wk]||0)+p.val});
  const sortedWeeks=Object.entries(weeklyMap).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  const selDate=new Date(S.finDate+'T00:00:00');
  const y=selDate.getFullYear(),m=selDate.getMonth();
  const firstDay=new Date(y,m,1).getDay(),offset=firstDay===0?6:firstDay-1;
  const dim=new Date(y,m+1,0).getDate();
  const mNames=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const purchaseDates=new Set(ps.map(p=>p.date));
  const tod=todayStr();
  let cells='';for(let i=0;i<offset;i++)cells+=`<div class="cal-day empty"></div>`;
  for(let d2=1;d2<=dim;d2++){const ds=`${y}-${_p(m+1)}-${_p(d2)}`;cells+=`<div class="cal-day${ds===tod?' today':''}${purchaseDates.has(ds)?' has-p':''}${ds===S.finDate?' sel':''}" onclick="setFinDate('${ds}')"><div class="cal-num">${d2}</div>${purchaseDates.has(ds)?'<div class="cal-dot"></div>':''}</div>`;}
  const selPs=ps.filter(p=>p.date===S.finDate);
  const selTotal=selPs.reduce((a,p)=>a+p.val,0);
  const f=S.finForm;
  const metaInput=S.finMetaEdit
    ?`<div style="display:flex;gap:8px;align-items:center;margin-top:6px"><input type="number" value="${S.finMeta}" id="meta-input" style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;width:100px"/><button onclick="saveMeta()" style="padding:6px 12px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:8px;color:var(--green);font-family:var(--mono);font-size:10px;cursor:pointer">OK</button><button onclick="ss({finMetaEdit:false})" style="padding:6px 10px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-2);font-family:var(--mono);font-size:10px;cursor:pointer">×</button></div>`
    :`<div style="font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:4px;cursor:pointer" onclick="ss({finMetaEdit:true})">Meta: ${fmtBRL(S.finMeta)} · <span style="color:var(--green)">editar</span></div>`;
  return `<div class="scroll page">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 16px">
      <div><div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:5px">Gastos</div><div style="font-size:24px;font-weight:600;letter-spacing:-.4px">Financeiro</div></div>
      ${ring(metaPct,metaColor)}
    </div>
    <div class="stat-grid stagger" style="margin-bottom:16px">
      <div class="stat-card"><div class="slabel">Esta semana</div><div class="sval sm" style="color:${metaColor}">${fmtBRL(weekTotal)}</div>${metaInput}</div>
      <div class="stat-card"><div class="slabel">Total geral</div><div class="sval sm">${fmtBRL(allTotal)}</div><div class="ssub">${ps.length} lançamentos</div></div>
    </div>
    ${Object.keys(catTotals).length>0?`<div class="cat-bars"><div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Por categoria</div>${Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`<div class="cat-bar-row"><div class="cat-bar-name">${cat}</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${Math.round(val/maxCat*100)}%"></div></div><div class="cat-bar-val">${fmtBRL(val)}</div></div>`).join('')}</div>`:''}
    <div class="cal-wrap" style="margin-bottom:14px">
      <div class="cal-title-row"><div class="cal-month">${mNames[m]} ${y}</div><div class="cal-nav"><button onclick="prevMonth()">‹</button><button onclick="nextMonth()">›</button></div></div>
      <div class="cal-grid">${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
    </div>
    <div class="add-form" style="margin-bottom:14px">
      <div class="add-form-hdr"><span>Lançar · ${S.finDate.split('-').reverse().join('/')}</span>${selTotal>0?`<span style="font-family:var(--mono);font-size:10px">${fmtBRL(selTotal)}</span>`:''}</div>
      <div class="add-form-body">
        <div class="field-row"><div class="field" style="flex:2"><label>Item</label><input type="text" id="fin-name" value="${f.name}" placeholder="Peito de frango" oninput="updateFinForm('name',this.value)"/></div><div class="field"><label>R$</label><input type="number" id="fin-val" value="${f.val}" placeholder="0,00" min="0" step="0.01" oninput="updateFinForm('val',this.value)"/></div></div>
        <div class="field-row"><div class="field"><label>Categoria</label><select id="fin-cat" onchange="updateFinForm('cat',this.value)">${FIN_CATS.map(c=>`<option value="${c}"${f.cat===c?' selected':''}>${c}</option>`).join('')}</select></div></div>
        <button class="add-btn" onclick="addPurchase()">ADICIONAR</button>
      </div>
      <div style="padding:0 18px 14px">${selPs.length===0?`<div style="padding:14px;font-family:var(--mono);font-size:10px;color:var(--text-3);text-align:center">nenhum lançamento neste dia</div>`:selPs.map(p=>`<div class="purchase-item"><div class="pi-left"><div class="pi-name">${p.name}</div><div class="pi-cat">${p.cat}</div></div><div class="pi-val">${fmtBRL(p.val)}</div><button class="pi-del" onclick="deletePurchase('${p.id}')">×</button></div>`).join('')}</div>
    </div>
    ${sortedWeeks.length>0?`<div style="padding:0 20px;margin-bottom:14px"><div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Histórico semanal</div>${sortedWeeks.map(([wk,val])=>{const d3=new Date(wk+'T00:00:00');return `<div class="hist-row"><div class="hist-week">Semana ${_p(d3.getDate())}/${_p(d3.getMonth()+1)}</div><div style="display:flex;align-items:center;gap:10px"><div class="hist-val">${fmtBRL(val)}</div><div style="font-family:var(--mono);font-size:9px;color:${val>S.finMeta?'#ff453a':'#30d158'}">${val>S.finMeta?'acima':'ok'}</div></div></div>`;}).join('')}</div>`:''}
    <div class="sp16"></div>
  </div>`;
}

// ══════════════════════════════════════════
// PAGE: MEAL PREP
// ══════════════════════════════════════════
function renderMealPrep(){
  const total=PREP_ITEMS.length,done=PREP_ITEMS.filter(i=>(S.prepStock[i.name]||0)>0).length;
  const pct=Math.round(done/total*100);
  const cards=PREP_ITEMS.map(item=>{
    const qty=S.prepStock[item.name]||0,isDone=qty>0;
    return `<div class="prep-card"><div class="prep-hdr"><div class="prep-title">${item.name}</div><div class="prep-badge ${isDone?'done':'todo'}">${isDone?'preparado':'pendente'}</div></div><div class="prep-portions"><span>${item.unit}</span><div class="prep-controls"><button class="prep-btn" onclick="adjPrep('${item.name}',-1)">−</button><div class="prep-num">${qty}</div><button class="prep-btn" onclick="adjPrep('${item.name}',1)">+</button></div></div></div>`;
  }).join('');
  return `<div class="scroll page">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 16px">
      <div><div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:5px">Semana</div><div style="font-size:24px;font-weight:600;letter-spacing:-.4px">Meal Prep</div></div>
      ${ring(pct,'#30d158')}
    </div>
    <div class="wrap stagger">${cards}
    <button onclick="ss({prepStock:{}})" style="width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:12px;font-family:var(--mono);font-size:10px;color:var(--text-2);cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent">Zerar estoque</button>
    </div>
    <div class="sp16"></div>
  </div>`;
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function renderModal(){
  if(!S.showModal)return '';
  return `<div class="modal-overlay">
    <div class="modal">
      <h2>Bem-vindo ao Fluxo.</h2>
      <p>Seu plano alimentar, treinos e evolução em um só lugar. Qual é o seu nome?</p>
      <input type="text" placeholder="Seu nome" value="${S.nameInput||''}" oninput="S.nameInput=this.value" onkeydown="if(event.key==='Enter')saveName()" autofocus/>
      <button class="modal-btn" onclick="saveName()">COMEÇAR</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  const map={
    inicio:renderInicio,dieta:renderDieta,progresso:renderProgresso,
    compras:renderCompras,mais:renderMais,receitas:renderReceitas,
    financeiro:renderFinanceiro,mealprep:renderMealPrep,
  };
  document.getElementById('app').innerHTML=(map[S.tab]||renderInicio)()+renderModal();
  renderTabBar();
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
window.setTab=t=>ss({tab:t});
window.setDay=i=>ss({day:i});
window.toggleFood=key=>{
  const prev=!!S.checked[key];
  const c={...S.checked};c[key]=!c[key];
  ss({checked:c});
  if(navigator.vibrate)navigator.vibrate(8);
  // check se completou o dia
  if(!prev){
    const day=DAYS[S.day];
    const total=MEAL_ORDER.reduce((a,m)=>a+MEALS[day][m].length,0);
    const done=Object.keys(c).filter(k=>k.startsWith(day+'__')&&c[k]).length;
    if(done===total)setTimeout(()=>fireConfetti(),100);
  }
};
window.toggleShop=key=>{const c={...S.shopChecked};c[key]=!c[key];ss({shopChecked:c});if(navigator.vibrate)navigator.vibrate(8)};
window.clearShop=()=>ss({shopChecked:{}});
window.setRecipeFilter=f=>ss({recipeFilter:f});
window.toggleRecipe=key=>{const e={...S.expanded};e[key]=!e[key];ss({expanded:e})};
window.setFinDate=d=>ss({finDate:d});
window.updateFinForm=(k,v)=>ss({finForm:{...S.finForm,[k]:v}});
window.prevMonth=()=>{const d=new Date(S.finDate+'T00:00:00');d.setDate(1);d.setMonth(d.getMonth()-1);ss({finDate:`${d.getFullYear()}-${_p(d.getMonth()+1)}-01`})};
window.nextMonth=()=>{const d=new Date(S.finDate+'T00:00:00');d.setDate(1);d.setMonth(d.getMonth()+1);ss({finDate:`${d.getFullYear()}-${_p(d.getMonth()+1)}-01`})};
window.addPurchase=()=>{
  const f=S.finForm;if(!f.name.trim()||!f.val||isNaN(parseFloat(f.val)))return;
  const p={id:Date.now().toString(),date:S.finDate,name:f.name.trim(),cat:f.cat,val:parseFloat(f.val)};
  ss({purchases:[...S.purchases,p],finForm:{name:'',cat:FIN_CATS[0],val:''}});
  setTimeout(()=>{const el=document.getElementById('fin-name');if(el)el.focus()},50);
};
window.deletePurchase=id=>ss({purchases:S.purchases.filter(p=>p.id!==id)});
window.saveMeta=()=>{const el=document.getElementById('meta-input');if(el&&!isNaN(parseFloat(el.value)))ss({finMeta:parseFloat(el.value),finMetaEdit:false})};
window.addWeight=()=>{
  const v=parseFloat(S.weightInput);
  if(isNaN(v)||v<30||v>300)return;
  const today=todayStr();
  const filtered=S.weights.filter(w=>w.date!==today);
  ss({weights:[...filtered,{date:today,val:v}].sort((a,b)=>a.date.localeCompare(b.date)),weightInput:''});
};
window.deleteWeight=date=>ss({weights:S.weights.filter(w=>w.date!==date)});
window.setEvalOpt=(k,v)=>ss({evalForm:{...S.evalForm,[k]:v}});
window.saveEval=()=>{
  const f=S.evalForm;if(!f.humor&&!f.energia&&!f.fome&&!f.nota)return;
  ss({evals:{...S.evals,[S.evalDay]:{...f}},evalForm:{humor:'',energia:'',fome:'',nota:''}});
};
window.adjPrep=(name,delta)=>{const s={...S.prepStock};s[name]=Math.max(0,(s[name]||0)+delta);ss({prepStock:s})};
window.addTreino=()=>{
  const tf=S.treinoForm;
  const entry={id:Date.now().toString(),date:S.treinoDate,tipo:tf.tipo,duracao:tf.duracao,exercicios:tf.exercicios,notas:tf.notas};
  ss({treinoLog:[...S.treinoLog,entry],treinoForm:{tipo:TREINO_TIPOS[0],duracao:'',notas:'',exercicios:''}});
  if(navigator.vibrate)navigator.vibrate([8,50,8]);
};
window.deleteTreino=id=>ss({treinoLog:S.treinoLog.filter(t=>t.id!==id)});
window.saveName=()=>{const n=(S.nameInput||'').trim();if(!n)return;ss({userName:n,showModal:false,nameInput:''})};

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
render();
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
</body>
</html>
